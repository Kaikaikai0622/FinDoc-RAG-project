name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  # =========================================================================
  # 阶段0: Pre-check (环境验证)
  # =========================================================================
  pre-check:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Check project structure
      run: |
        echo "=== 验证项目结构 ==="
        test -d src || (echo "错误: src/ 目录不存在" && exit 1)
        test -f pyproject.toml || (echo "错误: pyproject.toml 不存在" && exit 1)
        echo "✓ 项目结构正常"

    - name: Check dependency lock consistency
      run: |
        echo "=== 验证依赖配置 ==="
        # 检查 pyproject.toml 是否存在
        if [ ! -f pyproject.toml ]; then
          echo "错误: pyproject.toml 不存在"
          exit 1
        fi
        echo "✓ pyproject.toml 存在"

        # 验证 pyproject.toml 语法
        python -c "import tomllib; tomllib.load(open('pyproject.toml', 'rb'))" || \
          (echo "错误: pyproject.toml 格式无效" && exit 1)
        echo "✓ pyproject.toml 格式有效"

        # 检查是否有 requirements.txt（可选）
        if [ -f requirements.txt ]; then
          echo "ℹ 发现 requirements.txt"
        fi
        if [ -f requirements-dev.txt ]; then
          echo "ℹ 发现 requirements-dev.txt"
        fi

    - name: Check environment variables (non-blocking)
      run: |
        echo "=== 检查环境变量 ==="
        # 检查 API Keys 是否存在（仅打印状态，不暴露值）
        if [ -n "${MOONSHOT_API_KEY}" ]; then
          echo "✓ MOONSHOT_API_KEY 已设置"
        else
          echo "ℹ MOONSHOT_API_KEY 未设置（测试将使用 mock）"
        fi

        if [ -n "${DASHSCOPE_API_KEY}" ]; then
          echo "✓ DASHSCOPE_API_KEY 已设置"
        else
          echo "ℹ DASHSCOPE_API_KEY 未设置（测试将使用 mock）"
        fi

        # 检查可选的环境变量
        if [ -n "${LLM_PROVIDER}" ]; then
          echo "✓ LLM_PROVIDER = ${LLM_PROVIDER}"
        else
          echo "ℹ LLM_PROVIDER 未设置，将使用默认值"
        fi
      env:
        MOONSHOT_API_KEY: ${{ secrets.MOONSHOT_API_KEY }}
        DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
        LLM_PROVIDER: ${{ vars.LLM_PROVIDER }}

    - name: Validate Python syntax
      run: |
        echo "=== 验证 Python 语法 ==="
        python -m compileall src/ -q || (echo "错误: Python 语法检查失败" && exit 1)
        echo "✓ Python 语法检查通过"

  # =========================================================================
  # 阶段1: 代码质量检查
  # =========================================================================
  lint:
    runs-on: ubuntu-latest
    needs: pre-check
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install ruff mypy

    - name: Lint with ruff
      run: ruff check src/ tests/ scripts/ cli.py

    - name: Type check with mypy
      run: mypy src/ --ignore-missing-imports || true

  # =========================================================================
  # 阶段2: 单元测试
  # =========================================================================
  unit-tests:
    runs-on: ubuntu-latest
    needs: lint
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Cache dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt', '**/pyproject.toml') }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]" || pip install -e .
        pip install pytest pytest-asyncio

    - name: Run unit tests
      run: |
        pytest tests/unit -v --tb=short || true

  # =========================================================================
  # 阶段3: 冒烟测试（快速验证）
  # =========================================================================
  smoke-tests:
    runs-on: ubuntu-latest
    needs: lint
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Cache dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt', '**/pyproject.toml') }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]" || pip install -e .

    - name: Run smoke tests
      run: |
        # 使用 pytest 运行冒烟测试（正确处理 Python 路径）
        pytest tests/smoke -v --tb=short || true
      env:
        # 使用测试环境变量，避免连接真实API
        MOONSHOT_API_KEY: test-key
        DASHSCOPE_API_KEY: test-key

  # =========================================================================
  # 阶段4: 集成测试
  # =========================================================================
  integration-tests:
    runs-on: ubuntu-latest
    needs: [unit-tests, smoke-tests]
    timeout-minutes: 20  # 设置超时，防止因PDF处理耗时过长
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Cache dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt', '**/pyproject.toml') }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]" || pip install -e .
        pip install pytest pytest-asyncio httpx

    - name: Check test data availability
      run: |
        echo "=== 检查测试数据 ==="
        if [ -d "data/raw" ] && [ "$(ls -A data/raw/*.pdf 2>/dev/null | wc -l)" -gt 0 ]; then
          echo "✓ 发现 PDF 文件:"
          ls -lh data/raw/*.pdf | head -5
        else
          echo "⚠ 未找到 PDF 文件，部分测试将跳过"
        fi

    - name: Run integration tests
      run: |
        pytest tests/integration -v --tb=short --timeout=300 || true
      env:
        # 使用测试环境变量，避免连接真实API
        MOONSHOT_API_KEY: test-key
        DASHSCOPE_API_KEY: test-key
        # 使用临时目录存储测试数据
        SQLITE_DB_PATH: /tmp/test_doc_store.db
        CHROMA_PERSIST_DIR: /tmp/test_chroma_db
        # 标记为 CI 环境
        CI: true

  # =========================================================================
  # 阶段5: E2E测试
  # =========================================================================
  e2e-tests:
    runs-on: ubuntu-latest
    needs: integration-tests
    timeout-minutes: 15  # E2E 测试超时
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Cache dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt', '**/pyproject.toml') }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]" || pip install -e .
        pip install pytest

    - name: Check test data availability
      run: |
        echo "=== 检查测试数据 ==="
        if [ -d "data/raw" ] && [ "$(ls -A data/raw/*.pdf 2>/dev/null | wc -l)" -gt 0 ]; then
          echo "✓ 发现 PDF 文件，将运行完整 E2E 测试"
        else
          echo "⚠ 未找到 PDF 文件，部分测试将跳过"
        fi

    - name: Run E2E tests
      run: |
        pytest tests/e2e -v --tb=short --timeout=300 || true
      env:
        MOONSHOT_API_KEY: test-key
        DASHSCOPE_API_KEY: test-key
        SQLITE_DB_PATH: /tmp/e2e_doc_store.db
        CHROMA_PERSIST_DIR: /tmp/e2e_chroma_db
        CI: true

  # =========================================================================
  # 阶段6: 覆盖率报告
  # =========================================================================
  coverage:
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests]
    if: github.event_name == 'pull_request'
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]" || pip install -e .
        pip install pytest pytest-cov pytest-timeout

    - name: Generate coverage report
      run: |
        pytest tests/unit tests/integration --cov=src --cov-report=xml --cov-report=html --timeout=300 || true
      env:
        MOONSHOT_API_KEY: test-key
        DASHSCOPE_API_KEY: test-key
        CI: true

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        files: ./coverage.xml
        fail_ci_if_error: false
