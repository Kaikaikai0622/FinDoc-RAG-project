name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  # =========================================================================
  # 阶段1: 代码质量检查
  # =========================================================================
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install ruff mypy

    - name: Lint with ruff
      run: ruff check src/ tests/

    - name: Type check with mypy
      run: mypy src/ --ignore-missing-imports || true

  # =========================================================================
  # 阶段2: 单元测试
  # =========================================================================
  unit-tests:
    runs-on: ubuntu-latest
    needs: lint
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Cache dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt', '**/pyproject.toml') }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]" || pip install -e .
        pip install pytest pytest-asyncio

    - name: Run unit tests
      run: |
        pytest tests/unit -v --tb=short || true

  # =========================================================================
  # 阶段3: 冒烟测试（快速验证）
  # =========================================================================
  smoke-tests:
    runs-on: ubuntu-latest
    needs: lint
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Cache dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt', '**/pyproject.toml') }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]" || pip install -e .

    - name: Run smoke tests
      run: |
        # 运行所有冒烟测试
        python tests/smoke/test_chunker_fixes.py
        python tests/smoke/test_company_resolver.py
        python tests/smoke/test_comparison_two_step.py || true
        python tests/smoke/test_document_router.py
      env:
        # 使用测试环境变量，避免连接真实API
        MOONSHOT_API_KEY: test-key
        DASHSCOPE_API_KEY: test-key

  # =========================================================================
  # 阶段4: 集成测试
  # =========================================================================
  integration-tests:
    runs-on: ubuntu-latest
    needs: [unit-tests, smoke-tests]
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Cache dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt', '**/pyproject.toml') }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]" || pip install -e .
        pip install pytest pytest-asyncio httpx

    - name: Run integration tests
      run: |
        pytest tests/integration -v --tb=short
      env:
        # 使用测试环境变量，避免连接真实API
        MOONSHOT_API_KEY: test-key
        DASHSCOPE_API_KEY: test-key
        # 使用临时目录存储测试数据
        SQLITE_DB_PATH: /tmp/test_doc_store.db
        CHROMA_PERSIST_DIR: /tmp/test_chroma_db

  # =========================================================================
  # 阶段5: E2E测试
  # =========================================================================
  e2e-tests:
    runs-on: ubuntu-latest
    needs: integration-tests
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Cache dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt', '**/pyproject.toml') }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]" || pip install -e .
        pip install pytest

    - name: Run E2E tests
      run: |
        pytest tests/e2e -v --tb=short
      env:
        MOONSHOT_API_KEY: test-key
        DASHSCOPE_API_KEY: test-key
        SQLITE_DB_PATH: /tmp/e2e_doc_store.db
        CHROMA_PERSIST_DIR: /tmp/e2e_chroma_db

  # =========================================================================
  # 阶段6: 覆盖率报告
  # =========================================================================
  coverage:
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests]
    if: github.event_name == 'pull_request'
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]" || pip install -e .
        pip install pytest pytest-cov

    - name: Generate coverage report
      run: |
        pytest tests/unit tests/integration --cov=src --cov-report=xml --cov-report=html
      env:
        MOONSHOT_API_KEY: test-key
        DASHSCOPE_API_KEY: test-key

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        files: ./coverage.xml
        fail_ci_if_error: false
